spring.datasource.url=jdbc:h2:mem:eisenhower;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

eisenhower.jwt.signingkey=local-dev-signing-key-change-in-prod

# Point SMTP at a local dev inbox, e.g. Mailpit/MailHog on localhost:1025
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
eisenhower.mail.from=Eisenhower Matrix <no-reply@eisenhowermatrix.net>
eisenhower.app.base-url=http://localhost:8080
